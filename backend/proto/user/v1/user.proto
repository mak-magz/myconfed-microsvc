syntax = "proto3";

package user.v1;

option go_package = "github.com/mak-magz/myconfed-microsvc/backend/gen/proto/user/v1;userv1";

service UserService {
    rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message User {
    string id = 1;
    string name = 2;
    string email = 3;
}

message GetUserRequest {
	string id = 1;
}

message GetUserResponse {
	User user = 1;
}